    /* ================================
       SAFE DOM HELPERS
    ================================ */

    function $(id) {
      return document.getElementById(id);
    }

    function getVal(id) {
      const el = $(id);
      return el ? el.value : "";
    }

    function setVal(id, value) {
      const el = $(id);
      if (el) el.value = value;
    }

    .sidebar.open {

    // ✅ Token Check
    const token = localStorage.getItem("customerToken");
    const customerData = JSON.parse(localStorage.getItem("customerData"));

    if (!token) {
      console.log("❌ No Token Found, Redirecting...");
      window.location.href = "login.html";
    }

    // ✅ Show Customer Name
    if (customerData) {
      document.getElementById("customerName").innerText =
        "Hello, " + customerData.name + " 👋";
    }

    // ✅ Set Active Sidebar Item
    function setActive(element) {
      document.querySelectorAll(".menu-item").forEach(item =>
        item.classList.remove("active")
      );
      if (element) element.classList.add("active");
    }

    let shipmentChart = null;
    let animationFrameId = null;

    // ✅ Toggle Mobile Menu
    function toggleMenu() {
      console.log("📱 Toggling Mobile Menu...");

      const sidebar = document.getElementById("sidebar");
      const overlay = document.querySelector(".overlay");

      if (!sidebar) {
        console.error("❌ Sidebar Element Not Found");
        return;
      }

      sidebar.classList.toggle("open");
      overlay.classList.toggle("show");

      console.log("📌 Sidebar State:", sidebar.classList.contains("open") ? "Open" : "Closed");
    }

    function closeMenu() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.querySelector(".overlay");

      sidebar.classList.remove("open");
      overlay.classList.remove("show");

      console.log("📌 Mobile Menu Closed");
      document.body.classList.remove("menu-open");

    async function addMoneyToWallet() {

      const amount = Number(document.getElementById("addAmount").value);

      if (!amount || amount <= 0) {
        showPopup("Enter valid amount");
        return;
      }

      // 1️⃣ Create Razorpay Order
      const orderRes = await fetch(
        "https://nxtship-backend.onrender.com/api/wallet/create-order",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${localStorage.getItem("customerToken")}`
          },
          body: JSON.stringify({ amount })
        }
      );

      const orderData = await orderRes.json();

      const options = {
        key: "rzp_live_SL8Zr9PYlQ3By0", // YOUR KEY ID
        amount: orderData.order.amount,
        currency: "INR",
        order_id: orderData.order.id,

        handler: async function (response) {

          // 2️⃣ Verify Payment
          const verifyRes = await fetch(
            "https://nxtship-backend.onrender.com/api/wallet/verify-payment",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${localStorage.getItem("customerToken")}`
              },
              body: JSON.stringify({
                ...response,
                amount
              })
            }
          );

          const verifyData = await verifyRes.json();

          if (verifyData.success) {
            showPopup("✅ Money Added Successfully");
            document.getElementById("walletBalance").innerText =
              verifyData.walletBalance;

            loadTransactions();
          }
        },

        theme: {
          color: "#2563eb"
        }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    }

    function renderChart(shipmentsPerDay) {
      const ctx = document.getElementById("shipmentChart").getContext("2d");

      if (shipmentChart) {
        shipmentChart.destroy();
      }

      const labels = shipmentsPerDay.map(item => item._id);
      const counts = shipmentsPerDay.map(item => item.total);

      shipmentChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: labels,

          datasets: [{
            label: "Shipments (Last 7 Days)",
            data: counts,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }


    function exportReport() {
      const rows = document.querySelectorAll("table tr");
      let csv = [];

      rows.forEach(row => {
        const cols = row.querySelectorAll("td, th");
        let rowData = [];
        cols.forEach(col => rowData.push(col.innerText));
        csv.push(rowData.join(","));
      });

      const blob = new Blob([csv.join("\n")], { type: "text/csv" });
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "shipment-report.csv";
      a.click();

      window.URL.revokeObjectURL(url);
    }

    function animateValue(id, start, end, duration) {
      const obj = document.getElementById(id);

      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }

      const startTime = performance.now();

      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);

        const value = start + (end - start) * progress;

        obj.innerHTML = value.toFixed(2);

        if (progress < 1) {
          animationFrameId = requestAnimationFrame(update);
        }
      }

      animationFrameId = requestAnimationFrame(update);
    }

    async function createShipment() {

      const btn = document.getElementById("bookBtn");
      const loader = document.getElementById("bookingLoader");

      // 🛑 Prevent multiple clicks
      if (btn.dataset.loading === "true") return;
      btn.dataset.loading = "true";

      btn.disabled = true;
      loader.style.display = "inline";
      btn.innerText = "Booking Shipment...";

      try {

        showPopup("⏳ Creating Shipment... Please wait");

        const payload = {
          customerName: document.getElementById("receiverName")?.value || "",
          address: document.getElementById("receiverAddress")?.value || "",
          pincode: document.getElementById("toPincode")?.value || "",
          city: document.getElementById("receiverCity")?.value || "",
          state: document.getElementById("receiverState")?.value || "",
          phone: document.getElementById("receiverPhone")?.value || "",
          productName: document.getElementById("productName")?.value || "General Item",
          weight: document.getElementById("weight")?.value || "0.5",
          length: document.getElementById("length")?.value || "10",
          breadth: document.getElementById("breadth")?.value || "10",
          height: document.getElementById("height")?.value || "10",
          orderValue: document.getElementById("orderValue")?.value || 0,
          paymentMode: document.getElementById("paymentType")?.value || "Pre-paid",
          orderId: "ORD-" + Date.now()
        };

        const res = await fetch(
          "https://nxtship-backend.onrender.com/api/customer/shipment/book",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${localStorage.getItem("customerToken")}`
            },
            body: JSON.stringify(payload)
          }
        );

        const data = await res.json();

        if (!res.ok) {
          showPopup("❌ " + (data.message || "Shipment Failed"));
          return;
        }

        // ✅ SUCCESS FEEDBACK
        showPopup(`✅ Shipment Created AWB: ${data.waybill}`);

        // small delay → smoother UX
        setTimeout(() => {
          showShipmentSuccess(data);
        }, 600);

      } catch (err) {
        console.log("Shipment Error:", err);
        showPopup("❌ Server Error. Please try again.");
      }

      finally {
        // 🔄 Restore button safely
        btn.disabled = false;
        btn.dataset.loading = "false";
        loader.style.display = "none";
        btn.innerText = "🚀 Book Shipment";
      }
    }
